name = "achswap-ai-worker"
main = "src/index.ts"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

# Placeholders only. Real values go in:
# - Cloudflare Dashboard (for production deployment via UI)
# - root .env (for local indexing / build)
# - worker/.dev.vars (for local wrangler dev)

[vars]
QDRANT_URL = "https://YOUR_QDRANT_CLUSTER.qdrant.io"
QDRANT_COLLECTION = "achswap"
CEREBRAS_BASE_URL = "https://api.cerebras.ai/v1"
CEREBRAS_MODEL = "gemma-4-31b"

# Secrets set in Dashboard or .dev.vars:
# CHAT_API = your-cerebras-key
# QDRANT_API_KEY = your-qdrant-key-if-needed

[ai]
binding = "AI"
